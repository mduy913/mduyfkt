<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Love ❤️</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ff9ecb,#ff6ea9,#ff4f8b);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    position:relative;
    width:100%;
    max-width:500px;
    padding:20px;
}

.gif{
    width:220px;
    max-width:70vw;
    border-radius:20px;
    user-select:none;
    pointer-events:none;
}

h1{
    color:#fff;
    margin-top:20px;
    font-size:30px;
    text-shadow:0 0 15px rgba(255,255,255,.6);
}

.buttons{
    margin-top:35px;
    position:relative;
    width:100%;
    height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
}

button{
    border:none;
    cursor:pointer;
    border-radius:16px;
    transition:.25s;
    font-size:22px;
    padding:15px 40px;
    font-weight:bold;
    position:relative;
    z-index:2;
}

#yes{
    background:#ff2d55;
    color:#fff;
}

#no{
    background:#fff;
    color:#ff2d55;
}

#no.moving{
    position:fixed;
    z-index:999;
}

.message{
    position:fixed;
    left:50%;
    top:20px;
    transform:translateX(-50%);
    background:#fff;
    color:#ff2d55;
    padding:12px 22px;
    border-radius:15px;
    font-weight:bold;
    display:none;
    z-index:999;
    font-size:16px;
    white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,0.15);
}

.heart{
    position:fixed;
    font-size:26px;
    pointer-events:none;
    animation:fly 3s linear forwards;
    z-index:1000;
}

@keyframes fly{
    0%{
        transform:translateY(0) scale(1);
        opacity:1;
    }
    100%{
        transform:translateY(-800px) scale(2);
        opacity:0;
    }
}

@media (max-width:600px){
    .gif{width:160px;}
    h1{font-size:22px;}
    button{font-size:18px;padding:12px 28px;}
    .buttons{gap:20px;height:100px;}
    .message{font-size:14px;padding:10px 16px;}
}

@media (max-width:400px){
    h1{font-size:18px;}
    button{font-size:15px;padding:10px 20px;}
}
</style>
</head>
<body>

<div class="message" id="msg"></div>

<div class="container">
    <img class="gif" src="https://media.tenor.com/LxggFGxwOjIAAAAC/shy-cat.gif">
    <h1>Em đồng ý làm người yêu anh nhé? 😍</h1>
    <div class="buttons">
        <button id="yes">Em đồng ý</button>
        <button id="no">Không</button>
    </div>
</div>

<script>
const yes = document.getElementById("yes");
const no = document.getElementById("no");
const msg = document.getElementById("msg");

let scale = 1;
let isMoving = false;

const texts = [
    "Không",
    "Thôi mà 🥺",
    "Đừng bấm 😭",
    "Anh buồn đó...",
    "Suy nghĩ lại đi ❤️",
    "Em chắc chưa?",
    "🥹🥹🥹",
    "Không được đâu 😂",
    "Ấn Đồng Ý đi ❤️"
];

let index = 0;

function showMessage(text){
    msg.innerText = text;
    msg.style.display = "block";
    clearTimeout(window.msgTimer);
    window.msgTimer = setTimeout(() => {
        msg.style.display = "none";
    }, 1500);
}

function moveButton(){
    if (isMoving) return;
    isMoving = true;

    // Lấy kích thước nút
    const noW = no.offsetWidth || 140;
    const noH = no.offsetHeight || 60;

    // Giới hạn trong màn hình (có padding)
    const padding = 30;
    const maxX = window.innerWidth - noW - padding;
    const maxY = window.innerHeight - noH - padding;

    // Đảm bảo không ra khỏi màn hình
    let x = Math.max(padding, Math.random() * maxX);
    let y = Math.max(padding, Math.random() * maxY);

    // Đảm bảo không đè lên nút "Đồng ý"
    const yesRect = yes.getBoundingClientRect();
    let attempts = 0;
    while (attempts < 30) {
        const centerX = x + noW/2;
        const centerY = y + noH/2;
        const distX = Math.abs(centerX - (yesRect.left + yesRect.width/2));
        const distY = Math.abs(centerY - (yesRect.top + yesRect.height/2));
        // Nếu cách xa nút Yes thì dừng
        if (distX > 200 || distY > 150) break;
        // Nếu không, random lại
        x = Math.max(padding, Math.random() * maxX);
        y = Math.max(padding, Math.random() * maxY);
        attempts++;
    }

    // Chuyển sang chế độ fixed và di chuyển
    no.classList.add("moving");
    no.style.left = x + "px";
    no.style.top = y + "px";

    // Đổi text
    if (index < texts.length - 1) {
        index++;
    }
    no.innerText = texts[index];

    // Phóng to nút Yes
    scale += 0.12;
    yes.style.transform = `scale(${Math.min(scale, 2.5)})`;

    showMessage("😝 Không bấm được đâu!");

    setTimeout(() => {
        isMoving = false;
    }, 300);
}

// Reset nút "Không" về vị trí ban đầu
function resetNoButton(){
    no.classList.remove("moving");
    no.style.position = "relative";
    no.style.left = "auto";
    no.style.top = "auto";
    no.style.transform = "none";
    no.innerText = texts[0];
    index = 0;
    isMoving = false;
}

// ─── Sự kiện ────────────────────────────

// Nút "Không" - di chuyển khi hover/click
no.addEventListener("mouseenter", (e) => {
    e.preventDefault();
    if (!isMoving) moveButton();
});

no.addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (!isMoving) moveButton();
}, {passive: false});

no.addEventListener("click", (e) => {
    e.preventDefault();
    if (!isMoving) moveButton();
});

// Nút "Đồng ý"
yes.addEventListener("click", () => {
    document.body.innerHTML = "";
    document.body.style.margin = "0";
    document.body.style.background = "linear-gradient(135deg,#ff4f8b,#ff9ecb)";
    document.body.style.overflow = "hidden";
    document.body.style.display = "flex";
    document.body.style.justifyContent = "center";
    document.body.style.alignItems = "center";
    document.body.style.minHeight = "100vh";

    const container = document.createElement("div");
    container.style.textAlign = "center";
    container.style.padding = "20px";

    const title = document.createElement("h1");
    title.innerHTML = "❤️ Cảm ơn em đã đồng ý ❤️";
    title.style.color = "white";
    title.style.fontSize = "42px";
    title.style.textAlign = "center";
    title.style.textShadow = "0 0 20px #fff";
    title.style.marginBottom = "15px";
    container.appendChild(title);

    const sub = document.createElement("div");
    sub.innerHTML = "Anh hứa sẽ luôn yêu em 💖";
    sub.style.color = "white";
    sub.style.fontSize = "24px";
    sub.style.textAlign = "center";
    sub.style.textShadow = "0 0 15px rgba(255,255,255,0.3)";
    container.appendChild(sub);

    document.body.appendChild(container);

    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = ["❤️","💖","💕","💗","💓","💝"][Math.floor(Math.random()*6)];
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.bottom = "-40px";
        heart.style.fontSize = (20 + Math.random() * 35) + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 3000);
    }, 120);
});

// ─── Hiệu ứng hover Yes ─────────────────

yes.addEventListener("mouseenter", () => {
    yes.style.filter = "brightness(1.1)";
});

yes.addEventListener("mouseleave", () => {
    yes.style.filter = "brightness(1)";
});

yes.addEventListener("touchstart", () => {
    yes.style.filter = "brightness(1.1)";
});

yes.addEventListener("touchend", () => {
    yes.style.filter = "brightness(1)";
});

// ─── Window Events ──────────────────────

window.addEventListener("load", () => {
    resetNoButton();
    yes.style.transform = "scale(1)";
    scale = 1;
});

// Nếu nút bị lệch ra ngoài thì reset
window.addEventListener("resize", () => {
    const rect = no.getBoundingClientRect();
    if (rect.left < 0 || rect.top < 0 || 
        rect.right > window.innerWidth || 
        rect.bottom > window.innerHeight) {
        resetNoButton();
    }
});
</script>

</body>
</html>
