<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You Heart</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

ctx.fillStyle="hotpink";
ctx.font="12px Arial";

const points=[];

// Tạo điểm theo phương trình trái tim
for(let i=0;i<650;i++){

    const t=i*0.1;

    const x=16*Math.pow(Math.sin(t),3);

    const y=
        13*Math.cos(t)
        -5*Math.cos(2*t)
        -2*Math.cos(3*t)
        -Math.cos(4*t);

    points.push({
        x:x*20,
        y:-y*20
    });
}

let index=0;

function draw(){

    if(index>=points.length) return;

    const p=points[index];

    ctx.fillText(
        "I love you",
        canvas.width/2+p.x,
        canvas.height/2+p.y
    );

    index++;

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
