<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Làm người yêu anh nhé ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffdbe7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
width:360px;
background:#fff;
padding:35px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
font-size:35px;
color:#ff5f7d;
margin-bottom:20px;
}

p{
font-size:20px;
color:#666;
margin-bottom:35px;
line-height:1.5;
}

input{
width:100%;
padding:14px;
font-size:18px;
border-radius:12px;
border:2px solid #ffd1dc;
outline:none;
margin-bottom:20px;
}

.startBtn{
width:100%;
padding:15px;
border:none;
border-radius:50px;
background:#ff5f7d;
color:white;
font-size:22px;
cursor:pointer;
}

#page2,
#page3{
display:none;
}

.buttons{
position:relative;
height:140px;
margin-top:20px;
}

button{
padding:15px 40px;
font-size:24px;
border:none;
border-radius:50px;
color:#fff;
cursor:pointer;
position:absolute;
}

#yes{
left:20px;
bottom:0;
background:#2ecc71;
}

#no{
right:20px;
bottom:0;
background:#ff4d6d;
}

.heart{
font-size:80px;
margin-top:20px;
animation:beat .8s infinite;
}

@keyframes beat{
50%{
transform:scale(1.15);
}
}
</style>
</head>

<body>

<!-- Trang nhập tên -->
<div class="card" id="page1">
<h1>Xin chào 👋</h1>

<p>Em tên là gì?</p>

<input id="name" placeholder="Nhập tên của em">

<button class="startBtn" onclick="start()">Tiếp tục</button>

</div>

<!-- Trang hỏi -->
<div class="card" id="page2">

<h1 id="title"></h1>

<p>
Em làm người yêu anh nhé? ❤️
</p>

<div class="buttons">

<button id="yes">Yes</button>

<button id="no">No</button>

</div>

</div>

<!-- Trang cuối -->
<div class="card" id="page3">

<h1 id="result"></h1>

<p>
sến quá-)))
</p>

<div class="heart">
❤️
</div>

</div>

<script>

let username="";

function start(){

username=document.getElementById("name").value.trim();

if(username==""){
alert("Nhập tên trước nha ❤️");
return;
}

document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="block";

document.getElementById("title").innerHTML=
username+", làm người yêu anh nhé?";

}

const no=document.getElementById("no");

function moveNo(){

const w=no.offsetWidth;
const h=no.offsetHeight;

const x=Math.random()*(window.innerWidth-w-20);
const y=Math.random()*(window.innerHeight-h-20);

no.style.position="fixed";
no.style.left=x+"px";
no.style.top=y+"px";

}

no.addEventListener("mouseenter",moveNo);

no.addEventListener("touchstart",function(e){

e.preventDefault();

moveNo();

});

document.getElementById("yes").onclick=function(){

document.getElementById("page2").style.display="none";

document.getElementById("page3").style.display="block";

document.getElementById("result").innerHTML=
username+" ❤️";

}

</script>

</body>
</html>
