<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Làm người yêu anh nhé ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffdbe7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
width:350px;
background:#fff;
padding:35px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
color:#ff5f7d;
font-size:38px;
margin-bottom:20px;
}

p{
color:#666;
font-size:20px;
margin-bottom:40px;
}

.buttons{
position:relative;
height:130px;
}

button{
border:none;
padding:15px 40px;
font-size:25px;
font-weight:bold;
border-radius:50px;
cursor:pointer;
transition:.2s;
position:absolute;
}

#yes{
left:20px;
bottom:0;
background:#2ecc71;
color:white;
}

#no{
right:20px;
bottom:0;
background:#ff4d6d;
color:white;
}
</style>
</head>

<body>

<div class="card">

<h1>Làm người yêu anh nhé? ❤️</h1>

<p>
Nếu em chọn Yes thì từ giờ em là người yêu anh nha 🥰
</p>

<div class="buttons">
<button id="yes">Yes</button>
<button id="no">No</button>
</div>

</div>

<script>

const no=document.getElementById("no");

function moveButton(){

const w=window.innerWidth-140;
const h=window.innerHeight-80;

const x=Math.random()*w;
const y=Math.random()*h;

no.style.position="fixed";
no.style.left=x+"px";
no.style.top=y+"px";

}

no.addEventListener("mouseover",moveButton);
no.addEventListener("touchstart",function(e){
e.preventDefault();
moveButton();
});

document.getElementById("yes").onclick=function(){

let name=prompt("Tên của em là gì?");

if(!name) name="Em";

document.body.innerHTML=`
<div style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#ffdbe7;
">
<div style="
background:white;
padding:40px;
border-radius:30px;
text-align:center;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
">

<h1 style="color:#ff5f7d;font-size:40px;">
${name}
</h1>

<h2 style="margin-top:20px;font-size:32px;color:#ff5f7d;">
Em làm người yêu anh nhé ❤️
</h2>

<div style="font-size:90px;margin-top:25px;">
🥰💖
</div>

</div>
</div>
`;

}

</script>

</body>
</html>
