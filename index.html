<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You Heart</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let points = [];
let index = 0;

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    createHeart();
}

window.addEventListener("resize", resize);

function createHeart(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    points = [];
    index = 0;

    ctx.fillStyle = "hotpink";

    const fontSize = Math.max(10, Math.min(canvas.width / 80, 14));
    ctx.font = `bold ${fontSize}px Arial`;
    ctx.textAlign = "center";

    // Trái tim tự co theo màn hình
    const scale = Math.min(canvas.width, canvas.height) / 24;

    for(let i = 0; i < 650; i++){

        const t = i * 0.1;

        const x = 16 * Math.pow(Math.sin(t),3);

        const y =
            13 * Math.cos(t)
            -5 * Math.cos(2*t)
            -2 * Math.cos(3*t)
            -Math.cos(4*t);

        points.push({
            x: x * scale,
            y: -y * scale
        });
    }

    draw();
}

function draw(){

    if(index >= points.length) return;

    const p = points[index];

    ctx.fillText(
        "I love you",
        canvas.width/2 + p.x,
        canvas.height/2 + p.y
    );

    index++;

    requestAnimationFrame(draw);
}

resize();

</script>

</body>
</html>
