<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let points = [];
let index = 0;

function createHeart(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    points = [];
    index = 0;

    const scale = Math.min(canvas.width, canvas.height) / 40;

    const fontSize = Math.max(9, Math.min(canvas.width / 75, 14));

    ctx.font = `bold ${fontSize}px Arial`;
    ctx.fillStyle = "hotpink";

    // Nhiều điểm để chữ chồng lên nhau
    for(let i=0;i<=1800;i++){

        const t = i * 0.015;

        const x = 16 * Math.pow(Math.sin(t),3);

        const y =
            13*Math.cos(t)
            -5*Math.cos(2*t)
            -2*Math.cos(3*t)
            -Math.cos(4*t);

        points.push({
            x:x*scale,
            y:-y*scale
        });

    }

    animate();
}

function animate(){

    // Vẽ nhiều chữ mỗi frame để hiện vừa phải
    for(let i=0;i<8 && index<points.length;i++){

        const p = points[index];

        ctx.fillText(
            "I love you",
            canvas.width/2 + p.x,
            canvas.height/2 + p.y
        );

        index++;
    }

    if(index < points.length){
        requestAnimationFrame(animate);
    }

}

window.addEventListener("resize",createHeart);

createHeart();

</script>

</body>
</html>
