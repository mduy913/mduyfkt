<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😘</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#ffd6e7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.box{
    width:340px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
    color:#ff4d6d;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border:2px solid #ffc0cb;
    border-radius:10px;
    outline:none;
}

.btn{
    margin-top:20px;
    padding:12px 35px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    color:#fff;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    touch-action:manipulation;
}

.ok{
    background:#ff4d6d;
}

#ask{
    display:none;
}

#yes{
    position:fixed;
    left:30%;
    bottom:90px;
    background:#2ecc71;
}

#no{
    position:fixed;
    left:55%;
    bottom:90px;
    background:#ff4d6d;
    transition:left .08s linear, top .08s linear;
}
</style>

</head>
<body>

<div class="box" id="page1">

<h1>Đưa tên cho Duy biết nào 😋</h1>

<input id="name" placeholder="Nhập tên...">

<button class="btn ok" onclick="nextPage()">OK</button>

</div>

<div class="box" id="ask">

<h1 id="title"></h1>

<p style="font-size:22px;margin:20px 0;">
Em làm người yêu Duy nha 😋
</p>

<button id="yes" class="btn">Yes</button>
<button id="no" class="btn">No</button>

</div>

<script>

let nameUser="";

function nextPage(){

    nameUser=document.getElementById("name").value.trim();

    if(nameUser==""){
        alert("Nhập tên đi 😒");
        return;
    }

    document.getElementById("page1").style.display="none";
    document.getElementById("ask").style.display="block";

    document.getElementById("title").innerHTML="Xin chào "+nameUser+" 👋";
}

const no=document.getElementById("no");

function moveNo(){

    const w=no.offsetWidth;
    const h=no.offsetHeight;

    const x=Math.random()*(window.innerWidth-w-20);
    const y=Math.random()*(window.innerHeight-h-20);

    no.style.left=x+"px";
    no.style.top=y+"px";
}

// PC
document.addEventListener("mousemove",function(e){

    const rect=no.getBoundingClientRect();

    const dx=e.clientX-(rect.left+rect.width/2);
    const dy=e.clientY-(rect.top+rect.height/2);

    if(Math.sqrt(dx*dx+dy*dy)<120){
        moveNo();
    }

});

// Điện thoại
document.addEventListener("touchmove",function(e){

    const touch=e.touches[0];

    const rect=no.getBoundingClientRect();

    const dx=touch.clientX-(rect.left+rect.width/2);
    const dy=touch.clientY-(rect.top+rect.height/2);

    if(Math.sqrt(dx*dx+dy*dy)<120){
        moveNo();
    }

},{passive:true});

// Nếu lỡ bấm trúng thì vẫn chạy
no.addEventListener("click",function(e){
    e.preventDefault();
    moveNo();
});

document.getElementById("yes").onclick=function(){

document.body.innerHTML=`

<div style="
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
background:#ffd6e7;
text-align:center;
">

<h1 style="font-size:45px;color:#ff4d6d;">
${nameUser} 🖕
</h1>

<h2 style="margin-top:15px;">
Duy biết ngay mà m gay
</h2>

<div style="font-size:100px;margin-top:20px;">
🙃
</div>

</div>

`;

}

</script>

</body>
</html>
