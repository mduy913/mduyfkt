<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:#ffd6e7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}
.box{
width:340px;
background:#fff;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}
h1{
color:#ff4d6d;
margin-bottom:20px;
}
input{
width:100%;
padding:12px;
font-size:18px;
border:2px solid #ffc0cb;
border-radius:10px;
outline:none;
}
.btn{
margin-top:20px;
padding:12px 35px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
color:#fff;
}
.ok{background:#ff4d6d;}
#ask{display:none;}
#yes{
background:#2ecc71;
position:absolute;
left:30%;
bottom:100px;
}
#no{
background:#ff4d6d;
position:absolute;
left:55%;
bottom:100px;
}
</style>
</head>

<body>

<div class="box" id="page1">
<h1>Em tên gì? ❤️</h1>

<input id="name" placeholder="Nhập tên...">

<button class="btn ok" onclick="next()">OK</button>
</div>

<div class="box" id="ask">

<h1 id="title"></h1>

<p style="font-size:22px;margin:20px 0;">
Em làm người yêu anh nhé? 🥰
</p>

<button id="yes" class="btn">Yes</button>

<button id="no" class="btn">No</button>

</div>

<script>

let nameUser="";

function next(){

nameUser=document.getElementById("name").value.trim();

if(nameUser==""){
alert("Nhập tên trước nha ❤️");
return;
}

document.getElementById("page1").style.display="none";
document.getElementById("ask").style.display="block";

document.getElementById("title").innerHTML=
"Xin chào "+nameUser+" 👋";

}

const no=document.getElementById("no");

function moveNo(){

const w=no.offsetWidth;
const h=no.offsetHeight;

const x=Math.random()*(window.innerWidth-w-20);
const y=Math.random()*(window.innerHeight-h-20);

no.style.position="fixed";
no.style.left=x+"px";
no.style.top=y+"px";

}

no.addEventListener("mouseenter",moveNo);

no.addEventListener("touchstart",function(e){
e.preventDefault();
moveNo();
},{passive:false});

no.addEventListener("click",function(e){
e.preventDefault();
moveNo();
});

document.getElementById("yes").onclick=function(){

document.body.innerHTML=`
<div style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#ffd6e7;
flex-direction:column;
font-family:Arial;
text-align:center;
">

<h1 style="font-size:42px;color:#ff4d6d;">
${nameUser} ❤️
</h1>

<h2 style="margin-top:15px;">
từ giờ m là tài sản của mduy-))
</h2>

<div style="font-size:100px;margin-top:20px;">
💖
</div>

</div>
`;

}

</script>

</body>
</html>
